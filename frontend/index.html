<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>パックマン オンライン</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a1a;
    color: #fff;
    font-family: 'Courier New', monospace;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── Screens ── */
  .screen { display: none; width: 100%; max-width: 600px; padding: 20px; }
  .screen.active { display: flex; flex-direction: column; align-items: center; }

  /* ── Title ── */
  #title-text {
    font-size: 3rem;
    font-weight: bold;
    color: #FFD700;
    text-shadow: 0 0 20px #FFD700;
    margin: 40px 0 10px;
    letter-spacing: 4px;
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%,100% { text-shadow: 0 0 20px #FFD700; }
    50% { text-shadow: 0 0 40px #FFD700, 0 0 60px #FF8C00; }
  }
  .subtitle { color: #888; margin-bottom: 40px; font-size: 0.9rem; }

  /* ── Form ── */
  .card {
    background: #111133;
    border: 2px solid #333366;
    border-radius: 12px;
    padding: 30px;
    width: 100%;
    max-width: 420px;
  }
  .card h2 { color: #FFD700; margin-bottom: 20px; font-size: 1.2rem; text-align: center; }
  input[type=text] {
    width: 100%;
    padding: 12px 16px;
    background: #0a0a2a;
    border: 2px solid #333366;
    border-radius: 8px;
    color: #fff;
    font-size: 1rem;
    font-family: 'Courier New', monospace;
    outline: none;
    transition: border-color .2s;
    margin-bottom: 12px;
  }
  input[type=text]:focus { border-color: #FFD700; }
  input[type=text]::placeholder { color: #555; }

  .btn {
    width: 100%;
    padding: 13px;
    border: none;
    border-radius: 8px;
    font-size: 1rem;
    font-family: 'Courier New', monospace;
    font-weight: bold;
    cursor: pointer;
    transition: all .2s;
    margin-bottom: 10px;
  }
  .btn-yellow { background: #FFD700; color: #000; }
  .btn-yellow:hover { background: #FFA500; }
  .btn-blue { background: #4444aa; color: #fff; }
  .btn-blue:hover { background: #6666cc; }
  .btn-red { background: #aa2222; color: #fff; }
  .btn-red:hover { background: #cc4444; }
  .btn-green { background: #22aa44; color: #fff; }
  .btn-green:hover { background: #44cc66; }
  .btn-gray { background: #333; color: #aaa; }
  .btn-gray:hover { background: #555; color: #fff; }
  .btn:disabled { opacity: .4; cursor: not-allowed; }

  .divider {
    text-align: center;
    color: #555;
    margin: 14px 0;
    font-size: 0.85rem;
  }
  .error-msg {
    color: #ff4444;
    font-size: 0.85rem;
    text-align: center;
    margin-top: 8px;
    min-height: 20px;
  }

  /* ── Lobby ── */
  #room-id-display {
    background: #0a0a2a;
    border: 2px solid #FFD700;
    border-radius: 8px;
    padding: 12px;
    text-align: center;
    margin-bottom: 20px;
    letter-spacing: 4px;
    font-size: 1.5rem;
    color: #FFD700;
  }
  .copy-hint { color: #888; font-size: 0.75rem; margin-top: 4px; }
  #player-list { list-style: none; margin-bottom: 20px; width: 100%; }
  #player-list li {
    padding: 10px 14px;
    background: #0a0a2a;
    border: 1px solid #333366;
    border-radius: 6px;
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .player-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }
  .waiting-hint { color: #666; font-size: 0.85rem; text-align: center; margin-bottom: 16px; }

  /* ── Game screen ── */
  #game-screen {
    flex-direction: row;
    align-items: flex-start;
    justify-content: center;
    gap: 20px;
    max-width: 900px;
    padding: 10px;
  }

  #canvas-wrap { position: relative; flex-shrink: 0; }
  #gameCanvas {
    display: block;
    border: 3px solid #333366;
    border-radius: 6px;
  }
  #countdown-overlay {
    display: none;
    position: absolute;
    inset: 0;
    background: rgba(0,0,10,.75);
    font-size: 6rem;
    color: #FFD700;
    font-weight: bold;
    align-items: center;
    justify-content: center;
    border-radius: 4px;
  }

  /* ── Sidebar ── */
  #sidebar {
    display: flex;
    flex-direction: column;
    gap: 12px;
    min-width: 180px;
  }
  .side-card {
    background: #111133;
    border: 2px solid #333366;
    border-radius: 10px;
    padding: 14px;
  }
  .side-card h3 { color: #FFD700; font-size: 0.85rem; margin-bottom: 10px; letter-spacing: 1px; }
  .score-entry {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 5px 0;
    border-bottom: 1px solid #1a1a3a;
    font-size: 0.85rem;
  }
  .score-entry:last-child { border-bottom: none; }
  .score-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .score-pts { color: #FFD700; font-weight: bold; min-width: 40px; text-align: right; }
  .role-badge {
    font-size: 0.65rem;
    padding: 2px 6px;
    border-radius: 4px;
    font-weight: bold;
  }
  .badge-pacman { background: #FFD700; color: #000; }
  .badge-ghost { background: #444; color: #ccc; }

  #controls-info {
    font-size: 0.75rem;
    color: #666;
    line-height: 1.8;
  }
  #controls-info span { color: #aaa; }

  #my-role-display {
    font-size: 1rem;
    text-align: center;
    padding: 8px;
    border-radius: 6px;
    font-weight: bold;
  }
  .role-pacman-bg { background: #3a3a00; color: #FFD700; border: 1px solid #FFD700; }
  .role-ghost-bg { background: #2a0a3a; color: #cc88ff; border: 1px solid #cc88ff; }

  #pellet-bar-wrap { margin-top: 8px; }
  #pellet-bar-bg {
    background: #1a1a3a;
    border-radius: 4px;
    height: 8px;
    overflow: hidden;
  }
  #pellet-bar { height: 100%; background: #FFD700; transition: width .3s; border-radius: 4px; }
  .pellet-label { font-size: 0.7rem; color: #888; margin-top: 4px; text-align: center; }

  /* ── Game over overlay ── */
  #gameover-overlay {
    display: none;
    position: absolute;
    inset: 0;
    background: rgba(0,0,10,.88);
    flex-direction: column;
    align-items: center;
    justify-content: center;
    border-radius: 4px;
    text-align: center;
    gap: 10px;
  }
  #gameover-overlay h2 { font-size: 2.5rem; color: #FFD700; }
  #gameover-winner { font-size: 1.2rem; color: #fff; }
  #gameover-overlay .btn { width: 200px; }

  /* ── Mobile ── */
  #dpad {
    display: none;
    position: fixed;
    bottom: 20px;
    right: 20px;
    grid-template-columns: repeat(3, 50px);
    grid-template-rows: repeat(3, 50px);
    gap: 4px;
    z-index: 100;
  }
  .dpad-btn {
    background: rgba(255,215,0,.15);
    border: 2px solid rgba(255,215,0,.4);
    border-radius: 8px;
    color: #FFD700;
    font-size: 1.2rem;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    user-select: none;
    -webkit-user-select: none;
  }
  .dpad-btn:active { background: rgba(255,215,0,.4); }
  @media (max-width: 700px) {
    #dpad { display: grid; }
    #game-screen { flex-direction: column; align-items: center; }
    #gameCanvas { max-width: calc(100vw - 20px); height: auto; }
    #sidebar { flex-direction: row; flex-wrap: wrap; min-width: unset; width: 100%; }
    .side-card { flex: 1 1 140px; }
  }
</style>
</head>
<body>

<!-- ─── Start Screen ─────────────────────────────────────────── -->
<div id="start-screen" class="screen active">
  <div id="title-text">PAC-MAN</div>
  <div class="subtitle">オンライン マルチプレイヤー</div>

  <div class="card">
    <h2>参加する</h2>
    <input type="text" id="nickname" placeholder="ニックネーム（最大12文字）" maxlength="12" autocomplete="off">
    <button class="btn btn-yellow" id="btn-create">ルームを作成する</button>
    <div class="divider">── または ──</div>
    <input type="text" id="join-code" placeholder="ルームID（6文字）" maxlength="6" autocomplete="off"
           style="text-transform:uppercase; letter-spacing:3px;">
    <button class="btn btn-blue" id="btn-join">ルームに参加する</button>
    <div class="error-msg" id="start-error"></div>
  </div>
</div>

<!-- ─── Lobby Screen ─────────────────────────────────────────── -->
<div id="lobby-screen" class="screen">
  <div id="title-text" style="font-size:2rem; margin:20px 0 4px;">ロビー</div>
  <div class="card" style="max-width:420px;">
    <h2>ルームID</h2>
    <div id="room-id-display" onclick="copyRoomId()" style="cursor:pointer;">
      <span id="room-id-text">------</span>
    </div>
    <div class="copy-hint">クリックでコピー</div>

    <h2 style="margin-top:20px;">プレイヤー (<span id="player-count">0</span>/4)</h2>
    <ul id="player-list"></ul>

    <div class="waiting-hint" id="waiting-hint">友達にルームIDを共有してください（2〜4人）</div>
    <button class="btn btn-green" id="btn-start" disabled>ゲーム開始</button>
    <button class="btn btn-gray" id="btn-back-lobby" style="margin-top:6px;">← 戻る</button>
    <div class="error-msg" id="lobby-error"></div>
  </div>
</div>

<!-- ─── Game Screen ──────────────────────────────────────────── -->
<div id="game-screen" class="screen">
  <div id="canvas-wrap">
    <canvas id="gameCanvas" width="588" height="644"></canvas>
    <div id="countdown-overlay" style="display:none; position:absolute; inset:0; background:rgba(0,0,10,.75); font-size:6rem; color:#FFD700; font-weight:bold; align-items:center; justify-content:center; border-radius:4px;"></div>
    <div id="gameover-overlay">
      <h2 id="gameover-title">GAME OVER</h2>
      <div id="gameover-winner"></div>
      <div id="gameover-scores" style="margin:10px 0; font-size:0.9rem; color:#aaa;"></div>
      <button class="btn btn-yellow" id="btn-restart" style="width:200px;">もう一度</button>
      <button class="btn btn-gray" id="btn-quit" style="width:200px;">ロビーへ</button>
    </div>
  </div>

  <div id="sidebar">
    <div class="side-card">
      <h3>あなたの役割</h3>
      <div id="my-role-display">-</div>
    </div>

    <div class="side-card">
      <h3>スコア</h3>
      <div id="score-list"></div>
    </div>

    <div class="side-card">
      <h3>エサ残量</h3>
      <div id="pellet-bar-wrap">
        <div id="pellet-bar-bg"><div id="pellet-bar" style="width:100%"></div></div>
        <div class="pellet-label"><span id="pellet-count">0</span> 個残り</div>
      </div>
    </div>

    <div class="side-card" id="controls-card">
      <h3>操作</h3>
      <div id="controls-info"></div>
    </div>
  </div>
</div>

<!-- Mobile D-pad -->
<div id="dpad">
  <div></div>
  <div class="dpad-btn" id="dpad-up">▲</div>
  <div></div>
  <div class="dpad-btn" id="dpad-left">◀</div>
  <div></div>
  <div class="dpad-btn" id="dpad-right">▶</div>
  <div></div>
  <div class="dpad-btn" id="dpad-down">▼</div>
  <div></div>
</div>

<!-- Socket.io client from CDN -->
<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
<script>
// ─── Config ──────────────────────────────────────────────────────────────────
const SERVER_URL = window.location.hostname === 'localhost'
  ? 'http://localhost:3001'
  : 'https://pacman-online-grwx.onrender.com';

const CELL = 28;
const COLS = 21;
const ROWS = 23;
const GHOST_COLORS = ['#FF0000','#FFB8FF','#00FFFF','#FFB852'];
const GHOST_NAMES  = ['Blinky','Pinky','Inky','Clyde'];

// ─── State ───────────────────────────────────────────────────────────────────
let socket = null;
let myId = null;
let myName = '';
let myRole = null;
let roomId = null;
let gameState = null;
let animFrame = null;
let mouthAngle = 0;
let mouthDir = 1;
let ghostAnim = 0;
let lastTs = 0;
let keys = {};

// ─── Canvas setup ────────────────────────────────────────────────────────────
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
canvas.width  = COLS * CELL;
canvas.height = ROWS * CELL;

// ─── Screen helpers ──────────────────────────────────────────────────────────
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  document.getElementById('dpad').style.display =
    (id === 'game-screen') ? 'grid' : 'none';
}

function setError(id, msg) { document.getElementById(id).textContent = msg; }

// ─── Socket setup ────────────────────────────────────────────────────────────
function connectSocket() {
  if (socket && socket.connected) return;
  socket = io(SERVER_URL, { transports: ['websocket', 'polling'] });

  socket.on('connect', () => { myId = socket.id; });

  socket.on('room_created', ({ roomId: rid }) => {
    roomId = rid;
    document.getElementById('room-id-text').textContent = rid;
    showScreen('lobby-screen');
  });

  socket.on('room_joined', ({ roomId: rid }) => {
    roomId = rid;
    document.getElementById('room-id-text').textContent = rid;
    showScreen('lobby-screen');
  });

  socket.on('lobby', ({ roomId: rid, players }) => {
    document.getElementById('room-id-text').textContent = rid;
    document.getElementById('player-count').textContent = players.length;

    const list = document.getElementById('player-list');
    list.innerHTML = '';
    const colors = ['#FFD700','#FF0000','#FFB8FF','#00FFFF'];
    players.forEach((p, i) => {
      const li = document.createElement('li');
      li.innerHTML = `<span class="player-dot" style="background:${colors[i % colors.length]}"></span>
        <span>${escHtml(p.name)}${p.id === myId ? ' （あなた）' : ''}</span>`;
      list.appendChild(li);
    });

    const canStart = players.length >= 2;
    document.getElementById('btn-start').disabled = !canStart;
    document.getElementById('waiting-hint').textContent =
      canStart ? 'ゲームを開始できます！' : '友達にルームIDを共有してください（2〜4人）';
  });

  socket.on('state', (state) => {
    gameState = state;
    const me = state.players.find(p => p.id === myId);
    if (me) myRole = me.role;
    updateSidebar(state);
  });

  socket.on('game_over', (state) => {
    gameState = state;
    showGameOver(state);
  });

  socket.on('error', ({ msg }) => {
    const errEl = document.getElementById('start-error');
    const lobbyErr = document.getElementById('lobby-error');
    if (document.getElementById('lobby-screen').classList.contains('active')) {
      setError('lobby-error', msg);
    } else {
      setError('start-error', msg);
    }
  });

  socket.on('disconnect', () => {
    if (document.getElementById('game-screen').classList.contains('active')) {
      showGameOver({ winner: 'disconnect', players: gameState ? gameState.players : [] });
    }
  });
}

// ─── Start screen ────────────────────────────────────────────────────────────
document.getElementById('btn-create').addEventListener('click', () => {
  const name = document.getElementById('nickname').value.trim();
  if (!name) { setError('start-error', 'ニックネームを入力してください'); return; }
  myName = name;
  setError('start-error', '');
  connectSocket();
  socket.emit('create_room', { name });
});

document.getElementById('btn-join').addEventListener('click', () => {
  const name = document.getElementById('nickname').value.trim();
  const code = document.getElementById('join-code').value.trim().toUpperCase();
  if (!name) { setError('start-error', 'ニックネームを入力してください'); return; }
  if (code.length !== 6) { setError('start-error', 'ルームID（6文字）を入力してください'); return; }
  myName = name;
  setError('start-error', '');
  connectSocket();
  socket.emit('join_room', { name, roomId: code });
});

document.getElementById('join-code').addEventListener('input', (e) => {
  e.target.value = e.target.value.toUpperCase();
});

// ─── Lobby screen ────────────────────────────────────────────────────────────
document.getElementById('btn-start').addEventListener('click', () => {
  socket.emit('start_game');
  showScreen('game-screen');
  startRenderLoop();
  setupControls();
});

document.getElementById('btn-back-lobby').addEventListener('click', () => {
  socket && socket.disconnect();
  showScreen('start-screen');
});

function copyRoomId() {
  const id = document.getElementById('room-id-text').textContent;
  navigator.clipboard.writeText(id).catch(() => {});
  const el = document.getElementById('room-id-display');
  el.style.borderColor = '#44ff88';
  setTimeout(() => { el.style.borderColor = '#FFD700'; }, 800);
}

// ─── Controls ────────────────────────────────────────────────────────────────
function setupControls() {
  const info = document.getElementById('controls-info');
  if (myRole === 'pacman') {
    info.innerHTML = '<span>↑↓←→ / WASD</span><br>方向キーでパックマンを操作';
  } else {
    info.innerHTML = '<span>↑↓←→ / WASD</span><br>方向キーでゴーストを操作';
  }

  // D-pad
  const dpadMap = {
    'dpad-up':    [0,-1], 'dpad-down':  [0,1],
    'dpad-left':  [-1,0], 'dpad-right': [1,0],
  };
  Object.entries(dpadMap).forEach(([id, [dx,dy]]) => {
    const btn = document.getElementById(id);
    btn.ontouchstart = btn.onmousedown = (e) => {
      e.preventDefault(); sendMove(dx, dy);
    };
  });
}

document.addEventListener('keydown', (e) => {
  keys[e.code] = true;
  if (!socket || !gameState) return;
  const map = {
    ArrowUp: [0,-1], KeyW: [0,-1],
    ArrowDown: [0,1], KeyS: [0,1],
    ArrowLeft: [-1,0], KeyA: [-1,0],
    ArrowRight: [1,0], KeyD: [1,0],
  };
  if (map[e.code]) {
    e.preventDefault();
    sendMove(...map[e.code]);
  }
});

document.addEventListener('keyup', (e) => { delete keys[e.code]; });

function sendMove(dx, dy) {
  if (!socket || !gameState) return;
  if (myRole === 'pacman') {
    socket.emit('input', { dx, dy });
  } else {
    socket.emit('ghost_move', { dx, dy });
  }
}

// ─── Game over ───────────────────────────────────────────────────────────────
document.getElementById('btn-restart').addEventListener('click', () => {
  document.getElementById('gameover-overlay').style.display = 'none';
  socket.emit('restart');
  showScreen('lobby-screen');
  cancelAnimationFrame(animFrame);
});

document.getElementById('btn-quit').addEventListener('click', () => {
  socket && socket.disconnect();
  document.getElementById('gameover-overlay').style.display = 'none';
  showScreen('start-screen');
  cancelAnimationFrame(animFrame);
});

function showGameOver(state) {
  const overlay = document.getElementById('gameover-overlay');
  overlay.style.display = 'flex';

  const titleEl = document.getElementById('gameover-title');
  const winnerEl = document.getElementById('gameover-winner');
  const scoresEl = document.getElementById('gameover-scores');

  if (state.winner === 'pacman') {
    titleEl.textContent = 'PAC-MAN WIN!';
    titleEl.style.color = '#FFD700';
    winnerEl.textContent = 'パックマンがすべてのエサを食べました！';
  } else if (state.winner === 'ghosts') {
    titleEl.textContent = 'GHOST WIN!';
    titleEl.style.color = '#FF00FF';
    winnerEl.textContent = 'ゴーストがパックマンを捕まえました！';
  } else {
    titleEl.textContent = 'DISCONNECTED';
    titleEl.style.color = '#888';
    winnerEl.textContent = 'プレイヤーが切断しました';
  }

  const sorted = [...(state.players || [])].sort((a,b) => b.score - a.score);
  scoresEl.innerHTML = sorted.map(p =>
    `${p.name}: ${p.score}pt`
  ).join(' / ');
}

// ─── Sidebar ─────────────────────────────────────────────────────────────────
function updateSidebar(state) {
  const me = state.players.find(p => p.id === myId);
  if (me) {
    const roleEl = document.getElementById('my-role-display');
    if (me.role === 'pacman') {
      roleEl.textContent = '🟡 パックマン';
      roleEl.className = 'role-pacman-bg';
      document.getElementById('controls-info').innerHTML =
        '<span>↑↓←→ / WASD</span><br>方向キーで移動<br>エサを全部食べろ！';
    } else {
      const gi = me.ghostIndex || 0;
      roleEl.textContent = `👻 ゴースト (${GHOST_NAMES[gi]})`;
      roleEl.className = 'role-ghost-bg';
      document.getElementById('controls-info').innerHTML =
        '<span>↑↓←→ / WASD</span><br>方向キーで移動<br>パックマンを捕まえろ！';
    }
  }

  // Scores
  const scoreList = document.getElementById('score-list');
  const sorted = [...state.players].sort((a,b) => b.score - a.score);
  scoreList.innerHTML = sorted.map(p => {
    const badge = p.role === 'pacman'
      ? '<span class="role-badge badge-pacman">PAC</span>'
      : `<span class="role-badge badge-ghost" style="background:${GHOST_COLORS[p.ghostIndex||0]}22; color:${GHOST_COLORS[p.ghostIndex||0]}">GH</span>`;
    return `<div class="score-entry">
      ${badge}
      <span class="score-name">${escHtml(p.name)}</span>
      <span class="score-pts">${p.score}</span>
    </div>`;
  }).join('');

  // Pellet bar
  if (state.totalPellets > 0) {
    const pct = (state.pelletsLeft / state.totalPellets * 100).toFixed(1);
    document.getElementById('pellet-bar').style.width = pct + '%';
    document.getElementById('pellet-count').textContent = state.pelletsLeft;
  }
}

// ─── Render loop ─────────────────────────────────────────────────────────────
function startRenderLoop() {
  cancelAnimationFrame(animFrame);
  function loop(ts) {
    const dt = Math.min((ts - lastTs) / 1000, 0.1);
    lastTs = ts;
    ghostAnim += dt * 8;
    mouthAngle += mouthDir * dt * 4;
    if (mouthAngle > 0.35) mouthDir = -1;
    if (mouthAngle < 0.01) mouthDir = 1;

    if (gameState) draw(gameState);
    animFrame = requestAnimationFrame(loop);
  }
  animFrame = requestAnimationFrame(loop);
}

// ─── Drawing ─────────────────────────────────────────────────────────────────
function draw(state) {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = '#000011';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  drawMaze(state.maze);

  state.players.forEach(p => {
    if (p.role === 'pacman') drawPacman(p);
    else drawGhost(p);
  });
}

function drawMaze(maze) {
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const v = maze[r][c];
      const x = c * CELL;
      const y = r * CELL;

      if (v === 1) {
        // Wall
        ctx.fillStyle = '#1a1a6a';
        ctx.fillRect(x, y, CELL, CELL);
        // Border highlight
        ctx.strokeStyle = '#3333aa';
        ctx.lineWidth = 1;
        ctx.strokeRect(x + 0.5, y + 0.5, CELL - 1, CELL - 1);
      } else if (v === 2) {
        // Pellet
        ctx.fillStyle = '#FFE4B5';
        ctx.beginPath();
        ctx.arc(x + CELL/2, y + CELL/2, 3, 0, Math.PI*2);
        ctx.fill();
      } else if (v === 3) {
        // Power pellet (blinking)
        const blink = Math.sin(Date.now() / 200) > 0;
        if (blink) {
          ctx.fillStyle = '#FFD700';
          ctx.shadowColor = '#FFD700';
          ctx.shadowBlur = 12;
          ctx.beginPath();
          ctx.arc(x + CELL/2, y + CELL/2, 7, 0, Math.PI*2);
          ctx.fill();
          ctx.shadowBlur = 0;
        }
      }
    }
  }
}

function drawPacman(p) {
  if (!p.alive) return;
  const x = p.x;
  const y = p.y;
  const r = CELL * 0.42;

  // Mouth rotation based on direction
  let rot = 0;
  if (p.dx > 0) rot = 0;
  else if (p.dx < 0) rot = Math.PI;
  else if (p.dy > 0) rot = Math.PI / 2;
  else if (p.dy < 0) rot = -Math.PI / 2;

  const open = mouthAngle * Math.PI;

  ctx.fillStyle = '#FFD700';
  ctx.shadowColor = '#FFD700';
  ctx.shadowBlur = 8;
  ctx.beginPath();
  ctx.moveTo(x, y);
  ctx.arc(x, y, r, rot + open, rot + Math.PI * 2 - open);
  ctx.closePath();
  ctx.fill();
  ctx.shadowBlur = 0;

  // Eye
  const ex = x + Math.cos(rot - Math.PI/3) * r * 0.5;
  const ey = y + Math.sin(rot - Math.PI/3) * r * 0.5;
  ctx.fillStyle = '#000';
  ctx.beginPath();
  ctx.arc(ex, ey, 2.5, 0, Math.PI*2);
  ctx.fill();

  // Name tag
  drawNameTag(x, y - r - 12, p.name, '#FFD700');
}

function drawGhost(p) {
  const x = p.x;
  const y = p.y;
  const r = CELL * 0.42;
  const gi = p.ghostIndex || 0;
  const color = GHOST_COLORS[gi % GHOST_COLORS.length];

  ctx.fillStyle = color;
  ctx.shadowColor = color;
  ctx.shadowBlur = 6;

  // Body (rounded top + wavy bottom)
  ctx.beginPath();
  ctx.arc(x, y - r * 0.1, r, Math.PI, 0);
  // Wavy bottom
  const waves = 3;
  const waveW = (r * 2) / waves;
  let wx = x + r;
  const by = y + r * 0.9;
  ctx.lineTo(wx, by);
  for (let w = 0; w < waves; w++) {
    const cx1 = wx - waveW * 0.25;
    const cx2 = wx - waveW * 0.75;
    const tip = (w % 2 === 0) ? by - r * 0.4 : by + r * 0.2;
    ctx.quadraticCurveTo(cx1, tip, wx - waveW * 0.5, by);
    ctx.quadraticCurveTo(cx2, tip, wx - waveW, by);
    wx -= waveW;
  }
  ctx.closePath();
  ctx.fill();
  ctx.shadowBlur = 0;

  // Eyes
  const eyeY = y - r * 0.1;
  [-0.3, 0.3].forEach(offset => {
    const ex = x + r * offset;
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.ellipse(ex, eyeY, r*0.22, r*0.28, 0, 0, Math.PI*2);
    ctx.fill();

    ctx.fillStyle = '#00f';
    const pupilX = ex + Math.cos(ghostAnim * 0.5) * r * 0.08;
    ctx.beginPath();
    ctx.arc(pupilX, eyeY + r*0.04, r*0.12, 0, Math.PI*2);
    ctx.fill();
  });

  drawNameTag(x, y - r - 14, p.name, color);
}

function drawNameTag(x, y, name, color) {
  ctx.font = '10px Courier New';
  ctx.textAlign = 'center';
  const w = ctx.measureText(name).width + 8;
  ctx.fillStyle = 'rgba(0,0,0,0.6)';
  ctx.fillRect(x - w/2, y - 10, w, 13);
  ctx.fillStyle = color;
  ctx.fillText(name, x, y);
}

// ─── Util ────────────────────────────────────────────────────────────────────
function escHtml(s) {
  return String(s).replace(/[&<>"']/g, c =>
    ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
</script>
